name: 运行JQXX降维代码
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持页面手动点击运行

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 升级到v5消除Node废弃警告
      - name: 配置Python3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # 一键安装全部依赖（国内清华镜像）
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib scikit-learn umap-learn -i https://pypi.tuna.tsinghua.edu.cn/simple
          # MNIST数据集国内镜像加速
          echo "OPENML_BASE_URL=https://openml.liacs.nl/api/v1/" >> $GITHUB_ENV

      # 执行代码，提前设置无GUI绘图后端
      - name: 运行JQXX.py
        run: |
          python -c "import matplotlib; matplotlib.use('Agg')"
          python JQXX.py

      # 运行完成后下载生成的绘图图片
      - name: 上传输出结果
        uses: actions/upload-artifact@v4
        with:
          name: 降维绘图结果
          path: ./result
