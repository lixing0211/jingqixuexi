name: 运行JQXX降维代码
on:
  push:
    branches: [ main ] # 提交代码自动触发
  workflow_dispatch: # 支持页面手动点击运行

jobs:
  run-code:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置Python环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # 缓存依赖，下次运行更快

      # 3. 一键安装全部依赖（核心解决库缺失报错）
      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas matplotlib scikit-learn umap-learn -i https://pypi.tuna.tsinghua.edu.cn/simple

      # 4. 执行你的JQXX.py脚本
      - name: Run JQXX.py
        run: python JQXX.py
